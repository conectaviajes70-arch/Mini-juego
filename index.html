<!DOCTYPE html>
<html>
<head>
  <title>Conecta Game 🐍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      margin: 0;
      font-family: Arial;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h2 {
      color: #00f0ff;
      margin-bottom: 5px;
    }

    #score {
      margin-bottom: 10px;
    }

    canvas {
      border: 2px solid #00f0ff;
      width: 90vw;
      max-width: 350px;
      height: 90vw;
      max-height: 350px;
      background: black;
    }

    .controls {
      margin-top: 15px;
      display: grid;
      grid-template-columns: 70px 70px 70px;
      gap: 10px;
    }

    button {
      width: 70px;
      height: 70px;
      font-size: 20px;
      background: #111;
      color: #00f0ff;
      border: 1px solid #00f0ff;
      border-radius: 12px;
    }

    #startBtn {
      margin-top: 15px;
      width: 200px;
      height: 50px;
      font-size: 18px;
      background: #00f0ff;
      color: black;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h2>Conecta Snake 🐍</h2>
<div id="score">Puntaje: 0</div>

<canvas id="game"></canvas>

<button id="startBtn">▶️ Iniciar Juego</button>

<div class="controls">
  <div></div>
  <button onclick="setDir('UP')">⬆️</button>
  <div></div>

  <button onclick="setDir('LEFT')">⬅️</button>
  <button onclick="setDir('DOWN')">⬇️</button>
  <button onclick="setDir('RIGHT')">➡️</button>
</div>
  
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🔥 Tamaño REAL fijo interno
canvas.width = 300;
canvas.height = 300;

const box = 15;
const grid = canvas.width / box;

let snake;
let direction;
let food;
let game;
let score = 0;
let running = false;

function randomFood() {
  return {
    x: Math.floor(Math.random() * grid) * box,
    y: Math.floor(Math.random() * grid) * box
  };
}

function resetGame() {
  snake = [{ x: 10 * box, y: 10 * box }];
  direction = "RIGHT";
  food = randomFood();
  score = 0;
  document.getElementById("score").innerText = "Puntaje: 0";
}

function setDir(dir) {
  if (!running) return;

  if (dir === "UP" && direction !== "DOWN") direction = "UP";
  if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
  if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
}

function collision(head, body) {
  return body.some(s => s.x === head.x && s.y === head.y);
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // dibujar snake
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "#00f0ff" : "#0099aa";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // comida
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  let head = { x: snake[0].x, y: snake[0].y };

  if (direction === "UP") head.y -= box;
  if (direction === "DOWN") head.y += box;
  if (direction === "LEFT") head.x -= box;
  if (direction === "RIGHT") head.x += box;

  // 🔥 paredes
  if (
    head.x < 0 ||
    head.y < 0 ||
    head.x >= canvas.width ||
    head.y >= canvas.height ||
    collision(head, snake)
  ) {
    clearInterval(game);
    running = false;
    setTimeout(() => {
      alert("Game Over 😅 Puntaje: " + score);
    }, 100);
    return;
  }

  // comer
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").innerText = "Puntaje: " + score;
    food = randomFood();
  } else {
    snake.pop();
  }

  snake.unshift(head);
}

document.getElementById("startBtn").onclick = () => {
  resetGame();
  running = true;
  clearInterval(game);
  game = setInterval(draw, 120);
};
</script>

</body>
</html>
